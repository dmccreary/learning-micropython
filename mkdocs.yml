# Dan McCreary's Microsite Standards from here down

# Keep the dev-only HTML template out of the build, but DO copy the
# shared JS/CSS assets so the interactive posters can load them at runtime.
exclude_docs: |
  posters/shared-libs/main-template.html

theme:
  name: material
  logo: img/mascot/neutral.png
  favicon: img/favicon.ico
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
  palette:
    primary: '#642580'
    accent: '#41BAC1'
  # custom_dir: 'theme'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    # this adds the prev and next icons in the footer
    - navigation.footer
plugins:
  - search
  # Generates per-page Open Graph / Twitter Card images and emits og:title,
  # og:description, og:url, twitter:card, etc. Requires the imaging extra
  # (mkdocs-material[imaging]) plus system Cairo + freetype, which are
  # installed here. Card background matches the theme primary color.
  - social:
      cards_layout_options:
        background_color: '#642580'
  # Click any chapter image to open it fullscreen in a zoomable lightbox.
  # skip_classes keeps mascot poses out of the lightbox gallery -- without it
  # every Monty image is indexed and shows up in the prev/next arrows.
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
      skip_classes:
        - mascot-admonition-img

# Hooks -- loaded as raw Python modules, not plugins (avoids name collisions).
# `plugins/social_override.py` overrides og:image and twitter:image with the
# page's `image:` frontmatter value when present. Pages without `image:` are
# untouched -- mkdocs-material's default meta tags (and the social plugin's
# generated card, if enabled) pass through.
hooks:
  - plugins/social_override.py

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - meta
  # always put detailed BEFORE superfences
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true
      inline_syntax: ['round']
      block_syntax: ['square']
extra_css:
  - css/extra.css
  - css/mascot.css
extra_javascript:
  - js/extra.js
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
